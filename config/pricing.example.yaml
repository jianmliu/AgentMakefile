  sonnet-balanced: {input_per_mtok: 3.0,  output_per_mtok: 15.0}
  opus:            {input_per_mtok: 15.0, output_per_mtok: 75.0}
  opus-deep:       {input_per_mtok: 15.0, output_per_mtok: 75.0}
